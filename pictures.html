---
layout: default
title: Pictures
permalink: /pictures.html
---

<style>
    .gallery-container {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 10px;
        margin: 20px auto;
        max-width: 1200px;
    }

    .gallery-item {
        position: relative;
        overflow: hidden;
    }

    .gallery-item img {
        width: 100%;
        border-radius: 5px;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .gallery-item img:hover {
        transform: scale(1.05);
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        z-index: 1000;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
    }

    .modal-content {
        background: #2f2f2f;
        padding: 20px;
        border-radius: 10px;
        max-width: 600px;
        width: 100%;
    }

    .modal img {
        max-width: 100%;
        border-radius: 5px;
        margin-bottom: 10px;
    }

    .modal h3 {
        margin: 10px 0 0;
        font-size: 1.2rem;
    }

    .close-modal {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 24px;
        cursor: pointer;
        color: #fff;
        background: none;
        border: none;
    }

    .close-modal:hover {
        color: #ffe6a7;
    }

    details {
        margin-bottom: 20px;
        border: 1px solid rgba(188, 108, 37, 0.25);
        border-radius: 5px;
    }

    summary {
        cursor: pointer;
        padding: 12px 16px;
        font-size: 1.3rem;
        font-weight: 600;
        color: #bc6c25;
        letter-spacing: -0.5px;
        list-style: none;
    }

    summary::-webkit-details-marker {
        display: none;
    }

    details[open] summary {
        border-bottom: 1px solid rgba(188, 108, 37, 0.25);
        margin-bottom: 10px;
    }

    details .gallery-container {
        padding: 10px;
    }
</style>

{% for gallery in site.data.galleries %}
<details>
    <summary>{{ gallery.name }}</summary>
    <div class="gallery-container">
        {% for photo in gallery.photos %}
        <div class="gallery-item" data-caption="{{ photo.caption }}">
            <img src="{{ '/images/' | append: gallery.folder | append: '/' | append: photo.file | relative_url }}" alt="{{ photo.caption }}">
        </div>
        {% endfor %}
    </div>
</details>
{% endfor %}

<div id="modal" class="modal">
    <div class="modal-content">
        <button class="close-modal">&times;</button>
        <img id="modal-img" src="" alt="">
        <h3 id="modal-caption"></h3>
    </div>
</div>

<script>
    const modal = document.getElementById('modal');
    const modalImg = document.getElementById('modal-img');
    const modalCaption = document.getElementById('modal-caption');
    const closeModal = document.querySelector('.close-modal');
    const galleryItems = document.querySelectorAll('.gallery-item');

    galleryItems.forEach(item => {
        item.addEventListener('click', () => {
            modalImg.src = item.querySelector('img').src;
            modalCaption.textContent = item.getAttribute('data-caption');
            modal.style.display = 'flex';
        });
    });

    closeModal.addEventListener('click', () => {
        modal.style.display = 'none';
    });

    modal.addEventListener('click', (e) => {
        if (e.target === modal) {
            modal.style.display = 'none';
        }
    });
</script>
